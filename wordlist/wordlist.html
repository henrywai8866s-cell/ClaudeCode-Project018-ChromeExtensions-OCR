<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>單字列表 — OCR 學習助手</title>
  <link rel="stylesheet" href="wordlist.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <h1>📚 我的單字列表</h1>
      <span id="word-count" class="count-badge">0 個單字</span>
    </div>
    <div class="header-right">
      <input id="search" type="search" placeholder="搜尋單字或翻譯…" autocomplete="off" />
      <button id="btn-clear" class="btn-danger">清空全部</button>
    </div>
  </header>

  <main id="grid" class="grid">
    <div id="empty" class="empty">
      <div class="empty-icon">📖</div>
      <p>還沒有儲存任何單字</p>
      <p class="empty-sub">使用 <strong>Alt+Shift+O</strong> 或右鍵選單在網頁上選取英文單字</p>
    </div>
  </main>

  <script src="wordlist.js"></script>
</body>
</html>
