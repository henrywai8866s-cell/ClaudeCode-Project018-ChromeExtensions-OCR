<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wrap">
    <div class="title">
      <img src="../icons/icon48.png" class="title-icon" alt="" />
      <span>OCR 單字學習助手</span>
    </div>

    <button id="btn-wordlist" class="btn btn-primary">
      <span class="btn-icon">📖</span>開啟單字列表
    </button>
    <button id="btn-settings" class="btn btn-secondary">
      <span class="btn-icon">⚙️</span>設定 API Key
    </button>

    <div class="hint">
      快捷鍵：<kbd>Alt+Shift+O</kbd><br/>
      或右鍵選單啟用選取模式
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
